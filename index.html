<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YKS 2026 sınavına hazırlık: Hap bilgiler, çıkmış soru tarzında pratik sorular, net artırma taktikleri. TYT ve AYT tüm dersler.">
  <meta name="theme-color" content="#0a0a1a">
  <title>YKS 2026 Çalışma Asistanı</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  
  <!-- App Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Noscript -->
  <noscript>
    <div style="background:#e74c3c;color:white;padding:20px;text-align:center;font-family:Inter,sans-serif;">
      Bu uygulama JavaScript gerektirir. Lütfen tarayıcınızda JavaScript'i etkinleştirin.
    </div>
  </noscript>

  <!-- Particles Background -->
  <div id="particles-container">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Login/Register Overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-particles">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>
    <div class="login-card" id="login-card">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-size:4rem;margin-bottom:0.5rem;">🎓</div>
        <h1 class="gradient-text" style="font-size:2rem;">YKS 2026</h1>
        <p style="color:var(--text-secondary);">Çalışma Asistanı</p>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <h3 style="color:var(--text-primary);margin-bottom:1.5rem;text-align:center;">Giriş Yap</h3>
        <div style="margin-bottom:1rem;">
          <label style="color:var(--text-secondary);font-size:0.85rem;display:block;margin-bottom:0.4rem;">Kullanıcı Adı</label>
          <input type="text" id="login-username" placeholder="Kullanıcı adınız" 
            style="width:100%;padding:0.8rem 1rem;border-radius:10px;border:2px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-color)'">
        </div>
        <div style="margin-bottom:1.5rem;">
          <label style="color:var(--text-secondary);font-size:0.85rem;display:block;margin-bottom:0.4rem;">Şifre</label>
          <input type="password" id="login-password" placeholder="Şifreniz"
            style="width:100%;padding:0.8rem 1rem;border-radius:10px;border:2px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-color)'"
            onkeypress="if(event.key==='Enter')APP.doLogin()">
        </div>
        <div id="login-error" style="color:#e74c3c;font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;"></div>
        <button onclick="APP.doLogin()" 
          style="width:100%;padding:0.9rem;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 5px 20px rgba(102,126,234,0.4)'"
          onmouseout="this.style.transform='';this.style.boxShadow=''">
          <i class="fas fa-sign-in-alt"></i> Giriş Yap
        </button>
        <p style="text-align:center;margin-top:1.2rem;color:var(--text-secondary);font-size:0.9rem;">
          Hesabın yok mu? <a href="#" onclick="APP.showRegister();return false;" style="color:var(--primary);text-decoration:none;font-weight:600;">Kayıt Ol</a>
        </p>
      </div>

      <!-- Register Form -->
      <div id="register-form" style="display:none;">
        <h3 style="color:var(--text-primary);margin-bottom:1.5rem;text-align:center;">Kayıt Ol</h3>
        <div style="margin-bottom:1rem;">
          <label style="color:var(--text-secondary);font-size:0.85rem;display:block;margin-bottom:0.4rem;">Kullanıcı Adı</label>
          <input type="text" id="reg-username" placeholder="İstediğin kullanıcı adı"
            style="width:100%;padding:0.8rem 1rem;border-radius:10px;border:2px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-color)'">
        </div>
        <div style="margin-bottom:1.5rem;">
          <label style="color:var(--text-secondary);font-size:0.85rem;display:block;margin-bottom:0.4rem;">Şifre</label>
          <input type="password" id="reg-password" placeholder="Şifre belirle"
            style="width:100%;padding:0.8rem 1rem;border-radius:10px;border:2px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-color)'"
            onkeypress="if(event.key==='Enter')APP.doRegister()">
        </div>
        <div id="reg-error" style="color:#e74c3c;font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;"></div>
        <button onclick="APP.doRegister()" 
          style="width:100%;padding:0.9rem;border-radius:10px;background:linear-gradient(135deg,#2ecc71,#27ae60);color:white;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 5px 20px rgba(46,204,113,0.4)'"
          onmouseout="this.style.transform='';this.style.boxShadow=''">
          <i class="fas fa-user-plus"></i> Kayıt Ol
        </button>
        <p style="text-align:center;margin-top:1.2rem;color:var(--text-secondary);font-size:0.9rem;">
          Zaten hesabın var mı? <a href="#" onclick="APP.showLogin();return false;" style="color:var(--primary);text-decoration:none;font-weight:600;">Giriş Yap</a>
        </p>
      </div>
    </div>
  </div>

  <div class="app-container" id="app-container" style="display:none;">
    <!-- Mobile Header -->
    <div class="mobile-header" id="mobile-header">
      <button class="btn btn-icon" id="sidebar-toggle" aria-label="Menüyü aç/kapat">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="gradient-text" style="font-size:1.5rem;margin:0;">YKS 2026</h1>
      <div id="mobile-user-actions"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="gradient-text">🎓 YKS 2026</h2>
        <p class="sidebar-subtitle">Çalışma Asistanı</p>
      </div>

      <!-- User Info -->
      <div id="user-info" style="padding:0 1.2rem;margin-bottom:1rem;"></div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Navigation items rendered by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="exam-countdown" id="exam-countdown">
          <!-- Countdown rendered by JS -->
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary); margin-top: 1rem;">Yükleniyor...</p>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="tahmin.js"></script>
  <script src="sozel-tekrar.js"></script>
  <script src="app.js"></script>
</body>
</html>
